name: Actualizar Cartelera

on:
  schedule:
    - cron: '0 * * * *'   # cada hora
  workflow_dispatch:        # también se puede lanzar manualmente desde GitHub

jobs:
  scrape:
    runs-on: ubuntu-latest
    permissions:
      contents: write       # necesario para hacer commit

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Instalar dependencias
        run: pip install requests beautifulsoup4

      - name: Ejecutar scraper
        run: python3 scraper_cartelera.py

      - name: Commit y push si hay cambios
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/cartelera.json
          git diff --cached --quiet || git commit -m "chore: actualizar cartelera [skip ci]"
          git push
