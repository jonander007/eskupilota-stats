name: Actualizar datos diarios

on:
  schedule:
    - cron: '1 0 * * *'   # cada día a las 00:01 UTC
  workflow_dispatch:        # también se puede lanzar manualmente desde GitHub

jobs:
  scrape:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Instalar dependencias
        run: pip install requests beautifulsoup4 pandas

      - name: Ejecutar scraper cartelera
        run: python3 scraper_cartelera.py

      - name: Ejecutar scraper resultados
        run: python3 scraper_resultados.py
        continue-on-error: true

      - name: Commit y push si hay cambios
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/cartelera.json data/partidos.json || true
          git diff --cached --quiet || git commit -m "chore: actualizar datos diarios [skip ci]"
          git push
